<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Квитанция</title>

    <!-- QR -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }
        input, textarea {
            display: block;
            margin: 10px 0;
            padding: 8px;
            width: 300px;
        }
        button {
            padding: 10px;
        }
    </style>
</head>
<body>

<h2>Создать квитанцию</h2>

<form id="form">
    <input name="surname" placeholder="Фамилия" required>
    <input name="name" placeholder="Имя" required>
    <textarea name="purpose" placeholder="Назначение" required></textarea>
    <input name="amount" type="number" value="1000" required>

    <button>Создать PDF</button>
</form>

<script>
document.getElementById("form").addEventListener("submit", function(e) {
    e.preventDefault();

    const data = Object.fromEntries(new FormData(this).entries());

    const qrText = `Оплата|${data.surname}|${data.name}|${data.purpose}|${data.amount}`;

    const qrDiv = document.createElement("div");

    new QRCode(qrDiv, {
        text: qrText,
        width: 200,
        height: 200
    });

    setTimeout(() => {
        const img = qrDiv.querySelector("img");

        if (!img) {
            alert("Ошибка QR");
            return;
        }

        createPDF(img.src, data);

    }, 300);
});

function createPDF(qrImage, data) {

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    // ⚠️ ВАЖНО: используем встроенный шрифт с поддержкой UTF-8
    doc.setFont("Helvetica", "normal");

    doc.setFontSize(16);
    doc.text("Квитанция", 20, 20);

    doc.setFontSize(12);
    doc.text(`ФИО: ${data.surname} ${data.name}`, 20, 40);
    doc.text(`Назначение: ${data.purpose}`, 20, 50);
    doc.text(`Сумма: ${data.amount} руб.`, 20, 60);

    // QR
    doc.addImage(qrImage, "PNG", 20, 80, 80, 80);

    doc.save("receipt.pdf");
}
</script>

</body>
</html>
