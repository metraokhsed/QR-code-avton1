<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <title>Сервис подготовки квитанций</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        label { display: block; margin-top: 10px; }
        input, textarea { width: 100%; max-width: 500px; padding: 5px; }
        .pdf-btn { margin-top: 20px; cursor: pointer; color: blue; text-decoration: underline; }
        #qr-container { margin-top: 20px; }
    </style>
</head>
<body>
    <h2>Сервис подготовки квитанций - 11 дней.</h2>

    <label>Наименование получателя платежа:</label>
    <input type="text" id="recipientName" value='ООО "АВТОШКОЛА № 1"' />

    <label>Р/С:</label>
    <input type="text" id="accountNumber" value="40702810530000120382" />

    <label>Наименование банка:</label>
    <input type="text" id="bankName" value="КРАСНОДАРСКОЕ ОТДЕЛЕНИЕ N8619 ПАО СБЕРБАНК" />

    <label>БИК:</label>
    <input type="text" id="bik" value="040349602" />

    <label>К/С:</label>
    <input type="text" id="correspondentAccount" value="30101810100000000602" />

    <label>КПП получателя платежа:</label>
    <input type="text" id="kpp" value="231201001" />

    <label>ИНН:</label>
    <input type="text" id="inn" value="2312137727" />

    <hr>

    <label>Фамилия :</label>
    <input type="text" id="lastName" />

    <label>Имя :</label>
    <input type="text" id="firstName" />

    <label>Отчество :</label>
    <input type="text" id="middleName" />

    <label>Назначение :</label>
    <textarea id="purpose"></textarea>

    <label>Сумма платежа:</label>
    <input type="number" id="amountRub" placeholder="руб." style="width: 100px;" />
    <input type="number" id="amountKop" placeholder="коп." style="width: 60px;" />

    <div class="pdf-btn" onclick="generatePDF()">скачать инструкцию</div>
    <img src="https://upload.wikimedia.org/wikipedia/commons/8/87/PDF_file_icon.svg" alt="PDF" width="50" />
    <p>Нажмите кнопку выше, чтобы скачать в PDF</p>

    <div id="qr-container"></div>

    <!-- Подключаем библиотеки -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script>
        function generateQRCode() {
            const inn = document.getElementById('inn').value;
            const kpp = document.getElementById('kpp').value;
            const account = document.getElementById('accountNumber').value;
            const bik = document.getElementById('bik').value;
            const bankName = document.getElementById('bankName').value;
            const recipientName = document.getElementById('recipientName').value;
            const purpose = document.getElementById('purpose').value || '';
            const rub = parseFloat(document.getElementById('amountRub').value) || 0;
            const kop = parseFloat(document.getElementById('amountKop').value) || 0;
            const totalAmount = (rub * 100 + kop).toFixed(0); // в копейках

            // Формируем строку для QR по ГОСТ Р 56042-2014 (упрощённый вариант для СБП)
            // Пример формата: ST00012|Name=...|PersonalAcc=...|BankName=...|BIC=...|CorrespAcc=...|PayeeINN=...|KPP=...|Purpose=...|Sum=...
            let qrData = `ST00012|Name=${encodeURIComponent(recipientName)}|PersonalAcc=${account}|BankName=${encodeURIComponent(bankName)}|BIC=${bik}|CorrespAcc=${document.getElementById('correspondentAccount').value}|PayeeINN=${inn}|KPP=${kpp}|Purpose=${encodeURIComponent(purpose)}|Sum=${totalAmount}`;

            // Очищаем контейнер и создаём новый QR
            document.getElementById('qr-container').innerHTML = '';
            new QRCode(document.getElementById('qr-container'), {
                text: qrData,
                width: 128,
                height: 128
            });
        }

        async function generatePDF() {
            // Сначала генерируем QR
            generateQRCode();

            // Ждём немного, чтобы QR отрисовался
            await new Promise(resolve => setTimeout(resolve, 500));

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            // Добавляем заголовок
            doc.setFontSize(14);
            doc.text('ООО "АВТОШКОЛА № 1"', 20, 20);
            doc.setFontSize(10);
            doc.text('(Организация получатель платежа)', 20, 25);

            // Заполняем данные
            const fields = [
                { label: 'ИНН:', value: document.getElementById('inn').value },
                { label: 'КПП:', value: document.getElementById('kpp').value },
                { label: 'Р/С:', value: document.getElementById('accountNumber').value },
                { label: 'Наименование банка:', value: document.getElementById('bankName').value },
                { label: 'БИК:', value: document.getElementById('bik').value },
                { label: 'К/С:', value: document.getElementById('correspondentAccount').value },
                { label: 'Плательщик:', value: `${document.getElementById('lastName').value} ${document.getElementById('firstName').value} ${document.getElementById('middleName').value}` },
                { label: 'Назначение:', value: document.getElementById('purpose').value },
                { label: 'Сумма:', value: `${document.getElementById('amountRub').value} руб. ${document.getElementById('amountKop').value} коп.` }
            ];

            let y = 35;
            fields.forEach(field => {
                doc.text(`${field.label} ${field.value}`, 20, y);
                y += 7;
            });

            // Добавляем QR-код
            const qrCanvas = document.querySelector('#qr-container canvas');
            if (qrCanvas) {
                const imgData = qrCanvas.toDataURL('image/png');
                doc.addImage(imgData, 'PNG', 20, y + 10, 30, 30);
            }

            // Дата и подпись
            y += 50;
            doc.text('Подпись: _________________________ Дата: "__" ________ 20__ г.', 20, y);

            // Сохраняем PDF
            doc.save('квитанция.pdf');
        }
    </script>
</body>
</html>
