<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Квитанция</title>

    <!-- Шрифт -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

    <!-- Библиотеки -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        body {
            font-family: 'Roboto', sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }

        .box {
            background: white;
            padding: 20px;
            max-width: 500px;
            margin: auto;
            border-radius: 10px;
        }

        input, textarea {
            width: 100%;
            margin-top: 10px;
            padding: 8px;
            font-family: 'Roboto';
        }

        button {
            margin-top: 20px;
            padding: 12px;
            width: 100%;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }

        #pdf {
            display: none;
            width: 210mm;
            padding: 20mm;
            background: white;
            font-family: 'Roboto';
        }

        .qr {
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Оплата</h2>

    <form id="form">
        <input name="surname" placeholder="Фамилия" required>
        <input name="name" placeholder="Имя" required>
        <textarea name="purpose" placeholder="Назначение" required></textarea>
        <input name="amount" type="number" value="1000" required>

        <button>Создать PDF</button>
    </form>
</div>

<div id="pdf"></div>

<script>
document.getElementById("form").addEventListener("submit", function(e) {
    e.preventDefault();

    const data = Object.fromEntries(new FormData(this).entries());

    const qrText = `Оплата|${data.surname}|${data.name}|${data.purpose}|${data.amount}`;

    // создаём контейнер
    const qrDiv = document.createElement("div");

    new QRCode(qrDiv, {
        text: qrText,
        width: 200,
        height: 200
    });

    // ждём отрисовку QR
    setTimeout(() => {
        const img = qrDiv.querySelector("img");

        if (!img) {
            alert("Ошибка QR");
            return;
        }

        generatePDF(img.src, data);

    }, 300);
});

function generatePDF(qrImage, data) {

    const pdf = document.getElementById("pdf");

    pdf.innerHTML = `
        <h2>Квитанция</h2>
        <p>ФИО: ${data.surname} ${data.name}</p>
        <p>Назначение: ${data.purpose}</p>
        <p>Сумма: ${data.amount} руб.</p>
        <div class="qr">
            <img src="${qrImage}">
        </div>
    `;

    html2canvas(pdf, {
        scale: 2,
        useCORS: true
    }).then(canvas => {

        const imgData = canvas.toDataURL("image/png");

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        doc.addImage(imgData, "PNG", 0, 0, 210, 297);

        doc.output("dataurlnewwindow");
    });
}
</script>

</body>
</html>
